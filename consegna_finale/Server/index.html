<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcio DB — Client</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2230;
    --border: #2a2f3e;
    --accent: #00d4aa;
    --text: #e8eaf0;
    --text-muted: #6b738a;
    --text-dim: #9ba3b8;
    --danger: #ff4757;
    --success: #00d4aa;
    --fav-star: #f5a623;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .logo span { color: var(--accent); }

  .server-cfg { display: flex; align-items: center; gap: 8px; }
  .server-cfg input {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-dim); font-family: monospace; font-size: 12px;
    padding: 6px 10px; width: 380px; outline: none; transition: border-color 0.2s;
  }
  .server-cfg input:focus { border-color: var(--accent); color: var(--text); }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; transition: background 0.3s; }
  .status-dot.ok  { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.err { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }

  .layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 60px); }

  /* SIDEBAR */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-header h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }

  .load-btn { background: var(--accent); color: #000; border: none; border-radius: 5px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 12px; cursor: pointer; transition: opacity 0.2s; }
  .load-btn:hover { opacity: 0.8; }
  .load-btn:disabled { opacity: 0.4; cursor: default; }

  .teams-list { flex: 1; overflow-y: auto; padding: 0.4rem 0; }
  .teams-list::-webkit-scrollbar { width: 4px; }
  .teams-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .team-item { display: flex; align-items: center; gap: 10px; padding: 9px 1.2rem; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
  .team-item:hover { background: var(--surface2); }
  .team-item.active { background: var(--surface2); border-left-color: var(--accent); }

  .team-pos { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--text-muted); width: 18px; text-align: center; flex-shrink: 0; }
  .team-logo { width: 26px; height: 26px; object-fit: contain; flex-shrink: 0; }
  .team-name { flex: 1; font-size: 14px; color: var(--text-dim); }
  .team-item.active .team-name, .team-item:hover .team-name { color: var(--text); }

  .star-btn { background: none; border: none; cursor: pointer; font-size: 17px; line-height: 1; padding: 2px 4px; transition: transform 0.15s; color: var(--text-muted); opacity: 0; flex-shrink: 0; }
  .team-item:hover .star-btn, .team-item.active .star-btn { opacity: 1; }
  .star-btn:hover { transform: scale(1.3); }
  .star-btn.fav { color: var(--fav-star); opacity: 1 !important; }

  /* MAIN */
  .main { display: flex; flex-direction: column; overflow: hidden; }
  .main-header { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; min-height: 58px; }
  .main-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 0.04em; }
  .main-subtitle { font-size: 12px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif; }

  .players-grid { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; align-content: start; }
  .players-grid::-webkit-scrollbar { width: 4px; }
  .players-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .player-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.2s, transform 0.15s; position: relative; animation: fadeUp 0.2s ease both; }
  .player-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .player-photo-wrap { width: 100%; aspect-ratio: 1; background: var(--surface2); border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .player-photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .player-initials { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 700; color: var(--border); }

  .player-number { position: absolute; top: 10px; left: 10px; background: var(--accent); color: #000; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }

  .player-star-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.55); border: none; border-radius: 5px; font-size: 14px; padding: 3px 5px; cursor: pointer; transition: transform 0.15s; color: var(--text-muted); line-height: 1; }
  .player-star-btn:hover { transform: scale(1.2); }
  .player-star-btn.fav { color: var(--fav-star); }

  .player-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .player-role { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-family: 'Barlow Condensed', sans-serif; }

  .state-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-muted); padding: 4rem; text-align: center; }
  .state-box .icon { font-size: 48px; opacity: 0.3; }
  .state-box p { font-size: 14px; line-height: 1.6; }

  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; transform: translateY(20px); opacity: 0; transition: all 0.25s; z-index: 200; pointer-events: none; }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.ok   { border-color: var(--success); }
  #toast.err  { border-color: var(--danger); }
  #toast.warn { border-color: var(--fav-star); }
  .toast-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
  #toast.ok   .toast-dot { background: var(--success); }
  #toast.err  .toast-dot { background: var(--danger); }
  #toast.warn .toast-dot { background: var(--fav-star); }
</style>
</head>
<body>

<header>
  <div class="logo">Calcio <span>DB</span></div>
  <div class="server-cfg">
    <div class="status-dot" id="statusDot"></div>
    <input type="text" id="baseUrl" value="http://localhost/php/consegna_finale/Server/index.php" />
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Bundesliga</h2>
      <button class="load-btn" id="loadBtn" onclick="loadTeams()">Carica</button>
    </div>
    <div class="teams-list" id="teamsList">
      <div class="state-box">
        <div class="icon">⚽</div>
        <p>Premi "Carica" per vedere le squadre</p>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main-header" id="mainHeader">
      <div>
        <div class="main-title">Seleziona una squadra</div>
        <div class="main-subtitle">Rosa giocatori</div>
      </div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden" id="mainContent">
      <div class="state-box">
        <div class="icon">👈</div>
        <p>Clicca su una squadra per vedere i giocatori</p>
      </div>
    </div>
  </main>
</div>

<div id="toast"><div class="toast-dot"></div><span id="toastMsg"></span></div>

<script>
const API = () => document.getElementById('baseUrl').value.trim();
let favTeams = new Set(), favPlayers = new Set(), toastTimer = null;

function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

async function call(params, method = 'GET', body = null) {
  const url = API() + '?' + new URLSearchParams(params).toString();
  const opts = { method };
  if (body) opts.body = new URLSearchParams(body);
  const r = await fetch(url, opts);
  return r.json();
}

function setStatus(ok) {
  document.getElementById('statusDot').className = 'status-dot ' + (ok ? 'ok' : 'err');
}

async function loadFavorites() {
  try {
    const [teams, players] = await Promise.all([
      call({ action: 'get_favorite_teams' }),
      call({ action: 'get_favorite_players' })
    ]);
    if (Array.isArray(teams))   teams.forEach(t   => favTeams.add(String(t.team_id)));
    if (Array.isArray(players)) players.forEach(p => favPlayers.add(String(p.player_id)));
  } catch(e) {}
}

async function loadTeams() {
  const btn = document.getElementById('loadBtn');
  const list = document.getElementById('teamsList');
  btn.disabled = true;
  list.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:1rem 1.5rem;color:var(--text-muted);font-size:13px"><div class="spinner"></div>Caricamento...</div>';

  try {
    await loadFavorites();
    const data = await call({ action: 'get_teams' });
    setStatus(true);

    // struttura corretta: data.response.list
    const teams = data?.response?.list ?? [];

    if (!teams.length) {
      list.innerHTML = '<div class="state-box"><p>Nessuna squadra trovata</p></div>';
      btn.disabled = false;
      return;
    }

    list.innerHTML = '';
    teams.forEach((t, i) => {
      const id    = String(t.id);
      const name  = t.name;
      const logo  = t.logo ?? '';
      const pos   = t.idx;
      const isFav = favTeams.has(id);

      const div = document.createElement('div');
      div.className = 'team-item';
      div.style.animation = 'fadeUp 0.2s ease both';
      div.style.animationDelay = (i * 0.02) + 's';

      div.innerHTML = `
        <span class="team-pos">${pos}</span>
        <img class="team-logo" src="${logo}" alt="" onerror="this.style.opacity='0'">
        <span class="team-name">${name}</span>
        <button class="star-btn ${isFav ? 'fav' : ''}"
          onclick="toggleFavTeam(event,'${id}','${name.replace(/'/g,"\\'")}',this)">★</button>
      `;

      div.addEventListener('click', e => {
        if (e.target.classList.contains('star-btn')) return;
        document.querySelectorAll('.team-item').forEach(el => el.classList.remove('active'));
        div.classList.add('active');
        loadPlayers(id, name, logo);
      });

      list.appendChild(div);
    });

    btn.textContent = 'Aggiorna';
  } catch(e) {
    setStatus(false);
    list.innerHTML = '<div class="state-box"><div class="icon">❌</div><p>Errore: ' + e.message + '</p></div>';
  }
  btn.disabled = false;
}

async function toggleFavTeam(e, teamId, teamName, btn) {
  e.stopPropagation();
  const isFav = favTeams.has(teamId);
  try {
    if (isFav) {
      await call({ action: 'remove_team' }, 'POST', { team_id: teamId });
      favTeams.delete(teamId);
      btn.classList.remove('fav');
      toast('Squadra rimossa dai preferiti', 'warn');
    } else {
      const res = await call({ action: 'add_team' }, 'POST', { team_id: teamId, nome_squadra: teamName });
      if (res.status === 'exists') {
        toast('Già nei preferiti', 'warn');
        btn.classList.add('fav'); favTeams.add(teamId);
      } else if (res.status === 'ok') {
        favTeams.add(teamId); btn.classList.add('fav');
        toast('Squadra aggiunta ai preferiti ★', 'ok');
      } else {
        toast('Errore salvataggio', 'err');
      }
    }
  } catch(e) { toast('Errore di connessione', 'err'); }
}

async function loadPlayers(teamId, teamName, teamLogo) {
  document.getElementById('mainHeader').innerHTML = `
    <img src="${teamLogo}" alt="" style="width:36px;height:36px;object-fit:contain" onerror="this.style.display='none'">
    <div>
      <div class="main-title">${teamName}</div>
      <div class="main-subtitle" id="mainSubtitle">Caricamento...</div>
    </div>`;

  const content = document.getElementById('mainContent');
  content.innerHTML = '<div class="state-box"><div class="spinner"></div></div>';

  try {
    const data = await call({ action: 'get_players', team_id: teamId });

    // prova varie strutture possibili
    let players = [];
    if (Array.isArray(data?.response))               players = data.response;
    else if (Array.isArray(data?.response?.players)) players = data.response.players;
    else if (Array.isArray(data?.response?.list))    players = data.response.list;
    else if (Array.isArray(data))                    players = data;

    document.getElementById('mainSubtitle').textContent = players.length + ' giocatori';

    if (!players.length) {
      content.innerHTML = '<div class="state-box"><div class="icon">👥</div><p>Nessun giocatore trovato</p></div>';
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'players-grid';

    players.forEach((p, i) => {
      const id      = String(p.id ?? p.playerid ?? p.player_id ?? '');
      const nome    = p.firstName  ?? p.firstname  ?? p.name?.split(' ')[0] ?? '';
      const cognome = p.lastName   ?? p.lastname   ?? p.name?.split(' ').slice(1).join(' ') ?? '';
      const numero  = p.shirtNumber ?? p.shirt_number ?? p.number ?? 0;
      const ruolo   = p.position   ?? p.role ?? '';
      const foto    = p.photo      ?? p.imageUrl ?? null;
      const nomeCompleto = (nome + ' ' + cognome).trim() || p.name || 'N/D';
      const iniziali = ((nome[0]||'') + (cognome[0]||'')).toUpperCase() || '?';
      const isFav = favPlayers.has(id);

      const card = document.createElement('div');
      card.className = 'player-card';
      card.style.animationDelay = (i * 0.03) + 's';

      const fotoHtml = foto
        ? `<img src="${foto}" alt="" onerror="this.parentElement.innerHTML='<span class=\\'player-initials\\'>${iniziali}</span>'">`
        : `<span class="player-initials">${iniziali}</span>`;

      card.innerHTML = `
        <div class="player-photo-wrap">${fotoHtml}</div>
        ${numero ? `<div class="player-number">#${numero}</div>` : ''}
        <button class="player-star-btn ${isFav ? 'fav' : ''}"
          onclick="toggleFavPlayer('${id}','${nome.replace(/'/g,"\\'")}','${cognome.replace(/'/g,"\\'")}',${numero},'${teamId}',this)">★</button>
        <div>
          <div class="player-name">${nomeCompleto}</div>
          ${ruolo ? `<div class="player-role">${ruolo}</div>` : ''}
        </div>`;

      grid.appendChild(card);
    });

    content.innerHTML = '';
    content.appendChild(grid);
  } catch(e) {
    content.innerHTML = '<div class="state-box"><div class="icon">❌</div><p>Errore: ' + e.message + '</p></div>';
  }
}

async function toggleFavPlayer(playerId, nome, cognome, numero, squadraId, btn) {
  const isFav = favPlayers.has(playerId);
  try {
    if (isFav) {
      await call({ action: 'remove_player' }, 'POST', { player_id: playerId });
      favPlayers.delete(playerId); btn.classList.remove('fav');
      toast('Giocatore rimosso dai preferiti', 'warn');
    } else {
      const res = await call({ action: 'add_player' }, 'POST', {
        player_id: playerId, nome, cognome, numero_maglia: numero, squadra_id: squadraId
      });
      if (res.status === 'exists') {
        toast('Già nei preferiti', 'warn');
        btn.classList.add('fav'); favPlayers.add(playerId);
      } else if (res.status === 'ok') {
        favPlayers.add(playerId); btn.classList.add('fav');
        toast('Giocatore aggiunto ai preferiti ★', 'ok');
      } else {
        toast('Errore salvataggio', 'err');
      }
    }
  } catch(e) { toast('Errore di connessione', 'err'); }
}

loadFavorites();
</script>
</body>
</html>
